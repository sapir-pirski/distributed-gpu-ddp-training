name: nebius-ddp-training

workdir: .

resources:
  infra: k8s/akademy-test-mk8s
  accelerators: "H100:1"
  memory: "60+"
  image_id: docker:cr.eu-north1.nebius.cloud/e00g98qe9694ryna8e/nebius-trainer:v3

num_nodes: 2

envs:
  MODEL_ID: "facebook/opt-2.7b"
  TRAIN_SCRIPT: "train.py"
  BLOCK_SIZE: "512"
  PER_DEVICE_TRAIN_BATCH_SIZE: "4"
  PER_DEVICE_EVAL_BATCH_SIZE: "4"
  GRADIENT_ACCUMULATION_STEPS: "1"
  DATALOADER_NUM_WORKERS: "8"
  TOKENIZERS_PARALLELISM: "false"
  NCCL_DEBUG: INFO
  NCCL_DEBUG_SUBSYS: INIT,NET

setup: |
  echo "Setup complete"
  nvidia-smi || true

run: |
  set -euxo pipefail

  MASTER_ADDR=$(echo "$SKYPILOT_NODE_IPS" | head -n 1)
  MASTER_PORT=29500

  echo "SKYPILOT_NODE_RANK=${SKYPILOT_NODE_RANK}"
  echo "SKYPILOT_NUM_NODES=${SKYPILOT_NUM_NODES}"
  echo "SKYPILOT_NUM_GPUS_PER_NODE=${SKYPILOT_NUM_GPUS_PER_NODE}"
  echo "SKYPILOT_NODE_IPS:"
  echo "$SKYPILOT_NODE_IPS"
  echo "MASTER_ADDR=${MASTER_ADDR}"
  echo "PWD=$(pwd)"
  test -f "${TRAIN_SCRIPT}"

  torchrun \
    --nproc_per_node=${SKYPILOT_NUM_GPUS_PER_NODE} \
    --nnodes=${SKYPILOT_NUM_NODES} \
    --node_rank=${SKYPILOT_NODE_RANK} \
    --master_addr=${MASTER_ADDR} \
    --master_port=${MASTER_PORT} \
    "${TRAIN_SCRIPT}"
