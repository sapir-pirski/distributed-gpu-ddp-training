name: Validate project

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate assignment artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zip unzip
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Check Python syntax
        run: |
          python -m py_compile train.py
          python -m py_compile scripts/validate_project.py
          python -m py_compile scripts/generate_run_summary.py

      - name: Validate JSON, YAML, and training evidence
        run: |
          python scripts/generate_run_summary.py
          python scripts/validate_project.py
          git diff --exit-code RUN_SUMMARY.md

      - name: Check shell scripts
        run: |
          bash -n run-full-project.sh
          shellcheck run-full-project.sh

      - name: Build and validate submission archive
        run: |
          ./run-full-project.sh package
          python scripts/validate_project.py --zip nebius-ddp-submission.zip

      - name: Check formatting issues in staged-style diff
        run: git diff --check

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
